<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#141420"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff"/>
      <stop offset="100%" style="stop-color:#0080ff"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Speedometer arc -->
  <path d="M 156 356 A 150 150 0 1 1 356 356" fill="none" stroke="url(#accent)" stroke-width="24" stroke-linecap="round"/>
  <!-- Needle -->
  <line x1="256" y1="340" x2="340" y2="200" stroke="#00f0ff" stroke-width="12" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="256" cy="340" r="16" fill="#00f0ff"/>
  <!-- DS text -->
  <text x="256" y="430" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="bold" font-size="60" fill="#00f0ff" opacity="0.8">DS</text>
</svg>
